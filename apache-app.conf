<Directory /var/www/html>
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

<FilesMatch "^\.">
    Require all denied
</FilesMatch>

<FilesMatch "(Dockerfile.*|docker-compose.*|apache-app\.conf|.*\.sql|.*\.md|README.*|commands\.txt|.*\.ipynb)$">
    Require all denied
</FilesMatch>

<DirectoryMatch "/\.git">
    Require all denied
</DirectoryMatch>

ProxyPreserveHost On
ProxyRequests Off
ProxyPass /api/ http://silverhappy_api:8080/api/
ProxyPassReverse /api/ http://silverhappy_api:8080/api/